<!DOCTYPE html>

        body { background: #f5f0ff; color: #1e1030; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .navbar { background: linear-gradient(135deg, #4c2a8a, #7b3fc4); padding: 15px 20px; color: #fff; }
        .navbar h2 { margin: 0; font-weight: 800; font-size: 22px; color: #fde98a; display: flex; align-items: center; gap: 10px; }
        .panel { background: #fff; border-radius: 12px; padding: 25px; box-shadow: 0 4px 20px rgba(76,42,138,0.08); margin-bottom: 25px; border: 1px solid rgba(123,63,196,0.18); }
        .panel h4 { color: #7b3fc4; font-weight: 700; border-bottom: 2px solid #ede6ff; padding-bottom: 10px; margin-bottom: 20px; font-size: 16px; text-transform: uppercase; letter-spacing: 1px; }
        label { font-weight: 600; font-size: 13px; color: #4a3a6e; margin-bottom: 6px; }
        .form-control { border-radius: 8px; font-size: 14px; border: 1px solid rgba(123,63,196,0.2); }
        .form-control:focus { border-color: #7b3fc4; box-shadow: 0 0 0 3px rgba(123,63,196,0.1); }
        
        /* Preview Output */
        .preview-pane { position: sticky; top: 20px; }
        .preview-box { background: #1a1b26; color: #a9b1d6; padding: 20px; border-radius: 8px; font-family: 'Courier New', Courier, monospace; font-size: 12px; height: calc(100vh - 180px); overflow-y: scroll; white-space: pre-wrap; }
        .copy-btn { background: linear-gradient(135deg, #4c2a8a, #7b3fc4); color: #fff; border: none; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; width: 100%; padding: 14px; border-radius: 8px; transition: all 0.3s; }
        .copy-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 16px rgba(76,42,138,0.2); }
    </style>
</head>
<body>

<div class="navbar mb-4">
    <h2><i class="fa-solid fa-wand-magic-sparkles"></i> eBay Listing Generator</h2>
    <div>Builds from Template V10 automatically</div>
</div>

<div class="container-fluid px-4 pb-5">
    <div class="row g-4">
        <!-- Form Column -->
        <div class="col-lg-7">
            
            <div class="panel">
                <h4>1. Product Title & Hero</h4>
                <div class="mb-3">
                    <label>Full Product Title (Used for H1 main title)</label>
                    <input type="text" id="val_title" class="form-control" value="Nike Air Flight 89 Cork – Black / Volt · UK 9 · Very Rare Limited Colourway">
                </div>
                <div class="mb-3">
                    <label>Highlight Word (Must exactly match a word in the title above. Will turn it purple.)</label>
                    <input type="text" id="val_highlight" class="form-control" value="Volt">
                </div>
                <div class="mb-3">
                    <label>Highlight Quote (Gold box quote underneath specs)</label>
                    <textarea id="val_quote" class="form-control" rows="2">"A very rare Cork / Volt colourway — natural cork upper means no two pairs look exactly alike."</textarea>
                </div>
            </div>

            <div class="panel">
                <h4>2. Key Images (URLs)</h4>
                <p style="font-size: 13px; color: #7a6a9e;">Provide standard image URLs. These will update the slider gallery.</p>
                <div class="row g-3">
                    <div class="col-md-6 mb-2"><label>Slide 1 (Main)</label><input type="text" id="val_img1" class="form-control" value="./images/s-l1600 (3).webp"></div>
                    <div class="col-md-6 mb-2"><label>Slide 2</label><input type="text" id="val_img2" class="form-control" value="./images/s-l1600 (5).webp"></div>
                    <div class="col-md-6 mb-2"><label>Slide 3</label><input type="text" id="val_img3" class="form-control" value="./images/s-l1600 (4).webp"></div>
                    <div class="col-md-6 mb-2"><label>Slide 4</label><input type="text" id="val_img4" class="form-control" value="./images/s-l1600 (2).webp"></div>
                    <div class="col-md-6 mb-2"><label>Slide 5</label><input type="text" id="val_img5" class="form-control" value="./images/s-l1600 (6).webp"></div>
                </div>
            </div>

            <div class="panel">
                <h4>3. Item Specifics</h4>
                <div class="row g-3">
                    <div class="col-md-4 mb-2"><label>Brand</label><input type="text" id="spec_brand" class="form-control" value="Nike"></div>
                    <div class="col-md-4 mb-2"><label>Model</label><input type="text" id="spec_model" class="form-control" value="Air Flight 89"></div>
                    <div class="col-md-4 mb-2"><label>Size</label><input type="text" id="spec_size" class="form-control" value="UK 9"></div>
                    <div class="col-md-4 mb-2"><label>Colour</label><input type="text" id="spec_colour" class="form-control" value="Cork / Black / Volt Green"></div>
                    <div class="col-md-4 mb-2"><label>Condition</label><input type="text" id="spec_cond" class="form-control" value="Pre-owned – Good"></div>
                    <div class="col-md-4 mb-2"><label>Condition % Meter</label><input type="number" id="spec_meter" class="form-control" value="65" min="0" max="100"></div>
                </div>
            </div>

        </div>

        <!-- Preview Column -->
        <div class="col-lg-5">
            <div class="preview-pane">
                <button class="copy-btn mb-3" onclick="copyCode()"><i class="fa-solid fa-copy me-2"></i> Copy HTML to Clipboard</button>
                <div class="preview-box" id="preview_code"></div>
            </div>
        </div>
    </div>
</div>

    function generateHtml() {
        try {
            // Use DOMParser to safely swap text and attributes
            const parser = new DOMParser();
            
            // To ensure <html> and <head> aren't horribly stripped or mangled by DOMParser, 
            // replacing substrings might be safer, but parsing is usually fine for formatting.
            // A hybrid approach: we parse, manipulate, then dump.
            const doc = parser.parseFromString(RAW_TEMPLATE, "text/html");

            // 1. Edit Title
            const titleEl = doc.querySelector('.product-title-box h1');
            const newTitle = document.getElementById('val_title').value;
            const highlightWord = document.getElementById('val_highlight').value;
            
            if (titleEl) {
                if (highlightWord && newTitle.includes(highlightWord)) {
                    titleEl.innerHTML = newTitle.replace(highlightWord, `<em>${highlightWord}</em>`);
                } else {
                    titleEl.textContent = newTitle;
                }
            }

            // 2. Edit Highlight Quote
            const quoteEl = doc.querySelector('.highlight-box p');
            if (quoteEl) {
                quoteEl.innerHTML = `<strong>"</strong>${document.getElementById('val_quote').value}<strong>"</strong>`;
            }

            // 3. Edit Images
            const images = [
                document.getElementById('val_img1').value,
                document.getElementById('val_img2').value,
                document.getElementById('val_img3').value,
                document.getElementById('val_img4').value,
                document.getElementById('val_img5').value,
            ];
            
            const slideWappers = doc.querySelectorAll('.imagsbox img');
            const thumbs = doc.querySelectorAll('.thumb img');
            
            for(let i=0; i<5; i++) {
                if(images[i]) {
                    if(slideWappers[i]) slideWappers[i].src = images[i];
                    if(thumbs[i]) thumbs[i].src = images[i];
                }
            }

            // 4. Specs
            // Map the tr labels to new data.
            const specTableRows = doc.querySelectorAll('.spec-table tr');
            const specsUpdates = {
                "Brand": document.getElementById('spec_brand').value,
                "Model": document.getElementById('spec_model').value,
                "UK Size": `<strong style="color:var(--purple)">${document.getElementById('spec_size').value}</strong>`,
                "Colour": document.getElementById('spec_colour').value,
                "Condition": `<strong style="color:var(--purple)">${document.getElementById('spec_cond').value}</strong>`
            };

            specTableRows.forEach(tr => {
                const labelTd = tr.querySelector('.spec-label');
                const valTd = tr.querySelector('td:nth-child(2)');
                if(labelTd && valTd) {
                    const label = (labelTd.textContent || "").trim();
                    if(specsUpdates[label]) {
                        valTd.innerHTML = specsUpdates[label];
                    }
                }
            });

            // 5. Condition Rating & Meter
            const condRating = doc.querySelector('.condition-rating');
            if(condRating) {
                condRating.innerHTML = `<i class="fa-solid fa-shoe-prints me-1"></i> ${document.getElementById('spec_cond').value}`;
            }

            const meterFill = doc.querySelector('.meter-fill');
            if(meterFill) {
                meterFill.style.width = document.getElementById('spec_meter').value + "%";
            }

            // We must format it back. 
            // We prepend the doctype because DOMParser drops it from standard `.innerHTML` dumps.
            const outputHTML = "<!doctype html>\n" + doc.documentElement.outerHTML;
            document.getElementById('preview_code').textContent = outputHTML;
        } catch(e) {
            document.getElementById('preview_code').textContent = "Error generating template: " + e.message;
        }
    }

    function copyCode() {
        const text = document.getElementById('preview_code').textContent;
        
        const markCopied = () => {
            const btn = document.querySelector('.copy-btn');
            const oldHtml = btn.innerHTML;
            btn.innerHTML = '<i class="fa-solid fa-check"></i> Copied!';
            btn.style.background = '#16a34a';
            setTimeout(() => {
                btn.innerHTML = oldHtml;
                btn.style.background = '';
            }, 2000);
        };

        if (!navigator.clipboard) {
            // Fallback for file:// protocol where clipboard API is blocked
            const textArea = document.createElement("textarea");
            textArea.value = text;
            textArea.style.position = "fixed"; 
            document.body.appendChild(textArea);
            textArea.focus();
            textArea.select();
            try {
                document.execCommand('copy');
                markCopied();
            } catch (err) {
                alert('Fallback copy failed');
            }
            document.body.removeChild(textArea);
            return;
        }

        navigator.clipboard.writeText(text).then(() => {
            markCopied();
        }).catch(err => {
            alert('Failed to copy: ' + err);
        });
    }

    // Bind events to auto-update
    document.querySelectorAll('input, textarea').forEach(el => {
        el.addEventListener('input', generateHtml);
    });

    // Init
    window.onload = generateHtml;

</script>
